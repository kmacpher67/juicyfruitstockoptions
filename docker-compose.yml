services:
  backend:
    build: .
    container_name: stock_portal_backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app # Map app code for hot reload
      - ./report-results:/app/report-results # Map output folder
      - ./logs:/app/logs # Map logs folder for persistence
      - ./data:/app/data # Map data folder for persistence
      # We also map the root files that are imported
      - ./stock_live_comparison.py:/app/stock_live_comparison.py
      - ./Ai_Stock_Database.py:/app/Ai_Stock_Database.py
      - ./export_mongo.py:/app/export_mongo.py
      - ./mongo_backup.json:/app/mongo_backup.json
      - ./tests:/app/tests # Map tests for execution
      - ./xdivs:/app/xdivs # Persist ICS files
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongo:27017/?authSource=admin
      # - MONGO_URI=mongodb://admin:admin123@localhost:27017/?authSource=admin
      - APP_NAME=JuicyFruit Stock Portal
      - RUN_TIME=16:00
      - ADMIN_USER=admin
      - ADMIN_PASS=admin123
      - ENVIRONMENT=development
      - IBKR_PORTAL_ENABLED=${IBKR_PORTAL_ENABLED:-true}
      - IBKR_PORTAL_BASE_URL=${IBKR_PORTAL_BASE_URL:-https://ibkr-portal:5000/v1/api}
      - IBKR_PORTAL_ACCOUNT_ID=${IBKR_PORTAL_ACCOUNT_ID:-U110638}
      - IBKR_PORTAL_VERIFY_SSL=${IBKR_PORTAL_VERIFY_SSL:-false}
      - IBKR_PORTAL_TIMEOUT_SECONDS=${IBKR_PORTAL_TIMEOUT_SECONDS:-10}
      - IBKR_TWS_ENABLED=true
      - IBKR_TWS_HOST=host.docker.internal
      - IBKR_TWS_PORT=7496
      - IBKR_TWS_CLIENT_ID=1

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

  mongo:
    # image: mongo:latest
    image: mongo:7.0 # Change this from mongo:latest
    container_name: stock_portal_mongo
    ports:
      - "27017:27017" # Exposed for local tools if needed
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand({ ping: 1 })' | mongosh --quiet -u admin -p admin123 --authenticationDatabase admin mongodb://localhost:27017/admin"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always

  # # IBKR Portal
  # ibkr-portal:
  #   image: eclipse-temurin:17-jre
  #   container_name: stock_portal_ibkr_portal
  #   working_dir: /opt/clientportal.gw
  #   command: ["./bin/run.sh", "root/conf.yaml"]
  #   volumes:
  #     - ./clientportal.gw:/opt/clientportal.gw
  #   ports:
  #     - "5000:5000"
  #   restart: unless-stopped

  # Frontend (Phase 2)
  frontend:
    build: ./frontend
    container_name: stock_portal_frontend
    ports:
      - "3000:5173" # Map host 3000 to container 5173 (Vite default)
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: always

volumes:
  mongo_data:
