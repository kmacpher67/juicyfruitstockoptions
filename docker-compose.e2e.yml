services:
  backend:
    environment:
      - IBKR_PORTAL_ENABLED=false
      - IBKR_TWS_ENABLED=false
    depends_on:
      - mongo

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    container_name: stock_portal_playwright
    working_dir: /work/frontend
    ipc: host
    environment:
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://frontend:5173
      - PLAYWRIGHT_SKIP_WEBSERVER=true
    volumes:
      - ./:/work
      - playwright_frontend_node_modules:/work/frontend/node_modules
      - playwright_browser_cache:/ms-playwright
    command: >
      bash -lc "
      (npm ci || npm install) &&
      until curl -s http://frontend:5173 >/dev/null; do
        echo 'Waiting for frontend container...';
        sleep 2;
      done &&
      npx playwright test
      "
    depends_on:
      - frontend
      - backend

volumes:
  playwright_frontend_node_modules:
  playwright_browser_cache:
